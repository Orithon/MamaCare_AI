services:
  - type: web
    name: mamacare-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: mamacare_db
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FRONTEND_URL
        sync: false
